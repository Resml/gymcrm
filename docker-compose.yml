version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: gym-whatsapp-db
    environment:
      POSTGRES_USER: gymadmin
      POSTGRES_PASSWORD: gympassword
      POSTGRES_DB: gym_whatsapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gym-whatsapp-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gym-whatsapp-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://gymadmin:gympassword@postgres:5432/gym_whatsapp?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
